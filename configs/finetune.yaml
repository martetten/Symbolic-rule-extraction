# configs/finetune.yaml
# Конфигурация дообучения

model_name: "Qwen/Qwen2.5-1.5B"
variant: "depth-0"
use_small: true
use_qlora: true

# Параметры обучения
epochs: 3
batch_size: 2
gradient_accumulation_steps: 8
learning_rate: 2e-4
max_length: 512

# LoRA гиперпараметры
lora:
  r: 8
  alpha: 16
  dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

# Пути сохранения
output_dir: "C:/MyPythonProjects/mephi_diss/results/checkpoints/finetune"
adapter_save_path: "C:/MyPythonProjects/mephi_diss/results/checkpoints/finetune/lora_final"
save_steps: 50
save_total_limit: 5

# Логирование
use_wandb: false
wandb_project: "mephi-diss-finetune"