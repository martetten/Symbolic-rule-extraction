# configs/sae.yaml

# Модель
model:
  name: "EleutherAI/pythia-1b-deduped"
  hook_point: "blocks.10.hook_resid_post"
  d_model: 2048

# SAE
sae:
  architecture: "topk"
  expansion_factor: 16
  k: 32            # Top-K активаций
  # use_topk: true
  use_ghost_grads: false

# Обучение
training:
  batch_size: 1024
  total_training_tokens: 2_000_000
  learning_rate: 1e-3
  lr_scheduler: "cosine"
  warmup_steps: 500
  use_wandb: false
  wandb_project: "mephi-diss-sae"
  # num_epochs: 10
  # weight_decay: 1e-4
  # early_stopping_patience: 3

