# configs/experiment.yaml

# Модель
model:
  size: "410m"  # "410m" или "1b"
  dtype: "float16"
  use_quantization: false

# Датасет
dataset:
  data_dir: "data/raw/rultaker/rule-reasoning-dataset-V2020.2.5.0/problog"
  variant: "depth-1"
  split: "train"
  max_samples: 1000  # null для всех данных

# Токенизация
tokenization:
  max_length: 128
  text_key: "assertion_statement"
  label_key: "label"

# DataLoader
dataloader:
  batch_size: 16
  shuffle: true
  num_workers: 0

# Выбор слоя (заполняется после 02_layer_probing.ipynb)
target_layer: null
hook_name: "resid_post"

# Пути
paths:
  data_processed: "data/processed"
  checkpoints: "results/checkpoints"
  logs: "results/logs"
  metrics: "results/metrics"
  rules: "results/rules"
  plots: "results/plots"

# Сид
seed: 42
device: "cuda"